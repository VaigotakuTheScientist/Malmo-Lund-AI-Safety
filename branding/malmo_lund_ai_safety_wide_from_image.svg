<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151224"/>
      <stop offset="100%" stop-color="#1a1726"/>
    </linearGradient>

    <linearGradient id="towerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#28c7ef"/>
      <stop offset="100%" stop-color="#aef09a"/>
    </linearGradient>

    <linearGradient id="catGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd23d"/>
      <stop offset="100%" stop-color="#f2a12d"/>
    </linearGradient>

    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#20bff2"/>
      <stop offset="45%" stop-color="#b6ef8d"/>
      <stop offset="72%" stop-color="#ffd64a"/>
      <stop offset="100%" stop-color="#f2a12d"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .txt { fill: #f1ede2; font-family: Arial, Helvetica, sans-serif; font-weight: 700; }
      .tower { fill: none; stroke: url(#towerGrad); stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
      .cat { fill: none; stroke: url(#catGrad); stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>

  <g opacity="0.05">
    <rect x="180" y="0" width="18" height="1024" fill="#ffffff"/>
    <rect x="490" y="0" width="14" height="1024" fill="#ffffff"/>
    <rect x="845" y="0" width="16" height="1024" fill="#ffffff"/>
    <rect x="1195" y="0" width="14" height="1024" fill="#ffffff"/>
  </g>

  <!-- Turning Torso -->
  <g transform="translate(332,264)">
    <path class="tower" d="M0 334 L44 0 L156 18 L124 300 Z"/>
    <path class="tower" d="M36 22 L18 334"/>
    <path class="tower" d="M132 16 L110 296"/>
    <path class="tower" d="M22 72 L140 81"/>
    <path class="tower" d="M15 132 L132 140"/>
    <path class="tower" d="M10 192 L124 201"/>
    <path class="tower" d="M5 252 L116 260"/>
  </g>

  <!-- Lund cathedral -->
  <g transform="translate(1060,258)">
    <path class="cat" d="M0 340V106L54 14L108 106V340"/>
    <path class="cat" d="M130 340V134L182 58L234 134V340"/>
    <path class="cat" d="M108 340L156 286L201 323V340"/>
    <path class="cat" d="M54 -14V14"/>
    <path class="cat" d="M38 0H70"/>
    <path class="cat" d="M182 36V58"/>
    <path class="cat" d="M166 46H198"/>
    <path class="cat" d="M30 146V194"/>
    <path class="cat" d="M63 146V194"/>
    <path class="cat" d="M160 168V212"/>
    <path class="cat" d="M192 168V212"/>
    <path class="cat" d="M144 274V340"/>
  </g>

  <!-- text -->
  <text class="txt" x="786" y="438" font-size="80" text-anchor="middle">MALMÖ • LUND</text>
  <text class="txt" x="786" y="562" font-size="128" text-anchor="middle">AI SAFETY</text>

  <!-- arc -->
  <path d="M142 706 C 438 594, 955 578, 1410 692" stroke="url(#arcGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M168 720 C 492 622, 981 610, 1328 706" stroke="url(#arcGrad)" stroke-width="4.8" fill="none" stroke-linecap="round" opacity="0.97"/>

  <!-- nodes -->
  <g filter="url(#glow)">
    <circle cx="768" cy="617" r="13" fill="#fff7a8" opacity="0.55"/>
    <circle cx="768" cy="617" r="9.5" fill="#f8efb7"/>
  </g>
  <circle cx="768" cy="617" r="11" fill="#f3edba"/>

  <g filter="url(#glow)">
    <circle cx="1272" cy="656" r="10" fill="#ffd180" opacity="0.4"/>
  </g>
  <circle cx="1272" cy="656" r="8" fill="#f0a23e"/>
</svg>
